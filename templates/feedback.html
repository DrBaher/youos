<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YouOS — Feedback</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e; color: #e0e0e0; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 2rem 1rem;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #c8c8ff; }
.container { width: 100%; max-width: 1100px; }
/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid #333; }
.tab {
  padding: 0.6rem 1.4rem; cursor: pointer; font-size: 0.9rem; font-weight: 600;
  color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: color 0.2s, border-color 0.2s;
}
.tab:hover { color: #ccc; }
.tab.active { color: #c8c8ff; border-bottom-color: #c8c8ff; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.panels {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
  margin-bottom: 1.5rem;
}
@media (max-width: 700px) { .panels { grid-template-columns: 1fr; } }
.panel { display: flex; flex-direction: column; }
.panel label { font-size: 0.85rem; color: #aaa; margin-bottom: 0.4rem; font-weight: 600; }
textarea {
  width: 100%; min-height: 220px; padding: 0.75rem;
  background: #16213e; border: 1px solid #333; border-radius: 6px;
  color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.9rem; resize: vertical; line-height: 1.5;
}
textarea:focus { outline: none; border-color: #6c63ff; }
.meta-row {
  display: flex; gap: 1.5rem; align-items: flex-end;
  flex-wrap: wrap; margin-bottom: 1.5rem;
}
.meta-row .field { flex: 1; min-width: 200px; }
.meta-row .field label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 0.3rem; font-weight: 600; }
.meta-row .field input[type="text"] {
  width: 100%; padding: 0.5rem 0.75rem;
  background: #16213e; border: 1px solid #333; border-radius: 6px;
  color: #e0e0e0; font-size: 0.9rem;
}
.meta-row .field input[type="text"]:focus { outline: none; border-color: #6c63ff; }
.stars { display: flex; gap: 0.3rem; align-items: center; }
.stars label.star-label { font-size: 0.85rem; color: #aaa; margin-right: 0.5rem; margin-bottom: 0; font-weight: 600; }
.stars input[type="radio"] { display: none; }
.stars .star {
  font-size: 1.5rem; cursor: pointer; color: #444;
  transition: color 0.15s;
}
.stars .star:hover, .stars .star.active { color: #ffc107; }
.btn-row { display: flex; gap: 1rem; flex-wrap: wrap; }
button {
  padding: 0.6rem 1.6rem; border: none; border-radius: 6px;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s;
}
button:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-generate { background: #6c63ff; color: #fff; }
.btn-generate:hover:not(:disabled) { background: #5a52d5; }
.btn-submit { background: #2ecc71; color: #fff; }
.btn-submit:hover:not(:disabled) { background: #27ae60; }
.btn-skip { background: #e67e22; color: #fff; }
.btn-skip:hover:not(:disabled) { background: #d35400; }
.btn-tone { background: #444; color: #e0e0e0; font-size: 0.8rem; padding: 0.4rem 1rem; }
.btn-tone:hover:not(:disabled) { background: #555; }
.tone-row { display: flex; gap: 0.6rem; margin-top: 0.6rem; flex-wrap: wrap; }
.tone-row label { font-size: 0.8rem; color: #888; align-self: center; }
.info {
  margin-top: 1rem; padding: 0.75rem 1rem;
  background: #16213e; border-radius: 6px; font-size: 0.85rem;
  border-left: 3px solid #6c63ff; display: none;
}
.info.visible { display: block; }
.info.success { border-left-color: #2ecc71; }
.info .precedent { color: #888; font-size: 0.8rem; margin-top: 0.4rem; }
.sender-card {
  margin-top: 0.5rem; padding: 0.6rem 0.8rem;
  background: #16213e; border: 1px solid #333; border-radius: 6px;
  font-size: 0.82rem; line-height: 1.6;
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.35s ease, opacity 0.3s ease, padding 0.3s ease, margin 0.3s ease;
}
.sender-card.visible { max-height: 200px; opacity: 1; }
.sender-card .sc-name { font-weight: 600; color: #c8c8ff; }
.sender-card .sc-company { color: #aaa; }
.sender-card .sc-type-badge {
  display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.5rem;
  border-radius: 3px; color: #fff; margin-left: 0.4rem; vertical-align: middle;
}
.sender-card .sc-stats { color: #888; font-size: 0.78rem; margin-top: 0.2rem; }
.sender-card .sc-note { color: #bbb; margin-top: 0.3rem; cursor: pointer; }
.sender-card .sc-note:hover { color: #fff; }
.sender-card .sc-note-edit {
  width: 100%; padding: 0.3rem 0.5rem; margin-top: 0.3rem;
  background: #1a1a2e; border: 1px solid #6c63ff; border-radius: 4px;
  color: #e0e0e0; font-size: 0.82rem; resize: none;
}
.sender-card .sc-new { color: #888; font-style: italic; }
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-left: 0.4rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* Review Queue */
.rq-header {
  display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap;
}
.rq-progress {
  display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; color: #aaa;
}
.rq-progress-bar {
  width: 120px; height: 8px; background: #333; border-radius: 4px; overflow: hidden;
}
.rq-progress-fill {
  height: 100%; background: #6c63ff; border-radius: 4px; transition: width 0.3s;
}
.rq-remaining { font-size: 0.8rem; color: #666; }
.rq-card {
  background: #16213e; border: 1px solid #333; border-radius: 8px; overflow: hidden;
}
.rq-card-body {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: 300px;
}
@media (max-width: 700px) { .rq-card-body { grid-template-columns: 1fr; } }
.rq-inbound, .rq-draft {
  padding: 1rem; display: flex; flex-direction: column;
}
.rq-inbound { border-right: 1px solid #333; }
@media (max-width: 700px) { .rq-inbound { border-right: none; border-bottom: 1px solid #333; } }
.rq-section-title {
  font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 0.6rem;
}
.rq-from { font-size: 0.85rem; margin-bottom: 0.4rem; }
.rq-from-name { color: #c8c8ff; font-weight: 600; }
.rq-from-company { color: #aaa; font-size: 0.8rem; }
.rq-from-type {
  display: inline-block; font-size: 0.65rem; padding: 0.1rem 0.45rem;
  border-radius: 3px; color: #fff; margin-left: 0.3rem; vertical-align: middle;
}
.rq-subject { font-size: 0.8rem; color: #999; margin-bottom: 0.5rem; }
.rq-inbound-text {
  flex: 1; max-height: 350px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5;
  color: #ccc; white-space: pre-wrap; word-break: break-word;
}
.rq-draft textarea {
  flex: 1; min-height: 200px; resize: vertical;
}
.rq-footer {
  padding: 0.8rem 1rem; border-top: 1px solid #333;
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.rq-footer .field { flex: 1; min-width: 150px; }
.rq-footer .field label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 0.2rem; font-weight: 600; }
.rq-footer .field input[type="text"] {
  width: 100%; padding: 0.4rem 0.6rem;
  background: #1a1a2e; border: 1px solid #333; border-radius: 4px;
  color: #e0e0e0; font-size: 0.85rem;
}
.rq-footer .field input[type="text"]:focus { outline: none; border-color: #6c63ff; }
.rq-loading {
  text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 0.95rem;
}
.rq-loading .spinner { width: 24px; height: 24px; margin: 0 auto 1rem; display: block; }
.rq-batch-complete {
  text-align: center; padding: 3rem 1rem; color: #e0e0e0;
}
.rq-batch-complete h2 { font-size: 1.2rem; color: #c8c8ff; margin-bottom: 0.8rem; }
.rq-batch-complete p { color: #aaa; margin-bottom: 1.5rem; }
.btn-load-batch { background: #6c63ff; color: #fff; padding: 0.7rem 2rem; font-size: 1rem; }
.btn-load-batch:hover { background: #5a52d5; }
</style>
</head>
<body>
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
    <h1>YouOS Feedback</h1>
    <div style="display:flex;gap:1rem;font-size:0.85rem;">
      <a href="/stats" style="color:#6c63ff;text-decoration:none;">Stats</a>
      <a href="/bookmarklet" style="color:#6c63ff;text-decoration:none;">Bookmarklet</a>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="draft-reply">Draft Reply</div>
    <div class="tab" data-tab="review-queue">Review Queue</div>
  </div>

  <!-- ═══ Tab 1: Draft Reply (original) ═══ -->
  <div class="tab-content active" id="tab-draft-reply">
    <div class="panels">
      <div class="panel">
        <label for="inbound">Inbound email</label>
        <textarea id="inbound" placeholder="Paste the inbound email here..."></textarea>
        <div style="margin-top: 0.5rem; display: flex; gap: 0.75rem; align-items: center;">
          <div style="flex: 1;">
            <label for="sender" style="font-size: 0.85rem; color: #aaa; font-weight: 600;">Sender email</label>
            <input type="text" id="sender" placeholder="e.g. john@crelio.com" style="width:100%;padding:0.4rem 0.6rem;background:#16213e;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:0.85rem;margin-top:0.2rem;">
          </div>
          <span id="senderBadge" style="font-size:0.75rem;padding:0.2rem 0.6rem;border-radius:4px;background:#333;color:#aaa;white-space:nowrap;margin-top:1.2rem;display:none;"></span>
        </div>
        <div class="sender-card" id="senderCard"></div>
      </div>
      <div class="panel">
        <label for="draft">Generated draft (editable)</label>
        <textarea id="draft" placeholder="Click 'Generate Draft' to produce a draft..." readonly></textarea>
        <div class="tone-row">
          <label>Re-generate:</label>
          <button class="btn-tone" data-tone="shorter" disabled>Shorter</button>
          <button class="btn-tone" data-tone="more_formal" disabled>More Formal</button>
          <button class="btn-tone" data-tone="more_detail" disabled>More Detail</button>
        </div>
      </div>
    </div>

    <div class="meta-row">
      <div class="field">
        <label for="note">Feedback note (optional)</label>
        <input type="text" id="note" placeholder="e.g. too formal, needs greeting...">
      </div>
      <div class="stars">
        <label class="star-label">Rating</label>
        <span class="star" data-val="1">&#9733;</span>
        <span class="star" data-val="2">&#9733;</span>
        <span class="star" data-val="3">&#9733;</span>
        <span class="star" data-val="4">&#9733;</span>
        <span class="star" data-val="5">&#9733;</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-generate" id="btnGenerate">Generate Draft</button>
      <button class="btn-submit" id="btnSubmit" disabled>Submit Feedback</button>
    </div>

    <div class="info" id="info"></div>
  </div>

  <!-- ═══ Tab 2: Review Queue ═══ -->
  <div class="tab-content" id="tab-review-queue">
    <div id="rqLoading" class="rq-loading" style="display:none;">
      <span class="spinner" style="width:24px;height:24px;display:block;margin:0 auto 1rem;"></span>
      Generating 10 drafts... (this takes ~30s)
    </div>

    <div id="rqMain" style="display:none;">
      <div class="rq-header">
        <div class="rq-progress">
          <span id="rqCount">0/10 reviewed</span>
          <div class="rq-progress-bar"><div class="rq-progress-fill" id="rqProgressFill" style="width:0%"></div></div>
          <span id="rqPct">0%</span>
        </div>
        <div class="rq-remaining" id="rqRemaining"></div>
      </div>

      <div class="rq-card">
        <div class="rq-card-body">
          <div class="rq-inbound">
            <div class="rq-section-title">Inbound</div>
            <div class="rq-from">
              <span class="rq-from-name" id="rqFromName"></span>
              <span class="rq-from-type" id="rqFromType"></span>
            </div>
            <div class="rq-from-company" id="rqFromCompany"></div>
            <div class="rq-subject" id="rqSubject"></div>
            <div class="rq-inbound-text" id="rqInboundText"></div>
          </div>
          <div class="rq-draft">
            <div class="rq-section-title">Draft (edit me)</div>
            <textarea id="rqDraftTextarea"></textarea>
          </div>
        </div>
        <div class="rq-footer">
          <div class="field">
            <label for="rqNote">Note</label>
            <input type="text" id="rqNote" placeholder="optional feedback note...">
          </div>
          <div class="stars" id="rqStars">
            <label class="star-label">Rating</label>
            <span class="star active" data-val="1">&#9733;</span>
            <span class="star active" data-val="2">&#9733;</span>
            <span class="star active" data-val="3">&#9733;</span>
            <span class="star active" data-val="4">&#9733;</span>
            <span class="star" data-val="5">&#9733;</span>
          </div>
          <button class="btn-skip" id="rqSkip">Skip</button>
          <button class="btn-tone" id="rqCompare">Compare</button>
          <button class="btn-submit" id="rqSubmitNext">Submit & Next</button>
        </div>
      </div>
    </div>

    <div id="rqBatchComplete" class="rq-batch-complete" style="display:none;">
      <h2>Batch complete! 🎉</h2>
      <p id="rqBatchMsg"></p>
      <div id="rqAutoResearch" style="margin-bottom:1rem;padding:0.6rem 0.8rem;background:#0d1b2a;border-radius:6px;border:1px solid #2a3a4a;color:#aaa;font-size:0.85rem;display:none;">
        <span id="rqArStatus">⚙️ Triggering autoresearch optimization in background…</span>
      </div>
      <button class="btn-load-batch" id="rqLoadNext">Load next batch</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ═══ Tab switching ═══
  const tabs = document.querySelectorAll('.tab');
  const tabContents = document.querySelectorAll('.tab-content');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tabContents.forEach(tc => tc.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      if (tab.dataset.tab === 'review-queue' && !rqLoaded) {
        loadBatch();
      }
    });
  });

  // ═══ Draft Reply tab (original logic) ═══
  const inbound = document.getElementById('inbound');
  const draft = document.getElementById('draft');
  const note = document.getElementById('note');
  const info = document.getElementById('info');
  const btnGen = document.getElementById('btnGenerate');
  const btnSub = document.getElementById('btnSubmit');
  const senderInput = document.getElementById('sender');
  const senderBadge = document.getElementById('senderBadge');
  const stars = document.querySelectorAll('#tab-draft-reply .star');
  let selectedRating = null;
  let generatedDraft = '';

  const personalDomains = new Set(['gmail.com','yahoo.com','hotmail.com','icloud.com','me.com','outlook.com','live.com','aol.com','protonmail.com','proton.me']);
  const automatedPrefixes = ['no-reply','noreply','donotreply','do-not-reply','invoice','billing','mailer','notifications'];
  const badgeColors = {internal:'#2ecc71',external_client:'#3498db',personal:'#9b59b6',automated:'#95a5a6',unknown:'#666'};

  function classifySender(email) {
    if (!email) return 'unknown';
    const m = email.match(/[\w.+-]+@[\w.-]+\.\w+/);
    if (!m) return 'unknown';
    const addr = m[0].toLowerCase();
    const [local, domain] = addr.split('@');
    const localBase = local.replace(/[._-]/g, '');
    for (const p of automatedPrefixes) { if (localBase === p.replace(/-/g,'') || localBase.startsWith(p.replace(/-/g,''))) return 'automated'; }
    if (false) return 'internal';
    if (personalDomains.has(domain)) return 'personal';
    return 'external_client';
  }

  const senderCard = document.getElementById('senderCard');
  let senderLookupTimer = null;

  function renderSenderCard(data) {
    if (!data.found) {
      senderCard.innerHTML = '<span class="sc-new">New sender — no history</span>';
      senderCard.classList.add('visible');
      return;
    }
    const p = data.profile;
    const typeBg = badgeColors[p.sender_type] || '#666';
    const noteText = p.relationship_note || 'Click to add a note...';
    const noteClass = p.relationship_note ? 'sc-note' : 'sc-note sc-new';
    let statsLine = '';
    if (p.reply_count > 0) {
      statsLine = 'Replied ' + p.reply_count + ' times';
      if (p.avg_reply_words) statsLine += ' · avg ' + p.avg_reply_words + ' words';
      if (p.first_seen) statsLine += ' · first seen ' + p.first_seen.split('T')[0];
    }
    senderCard.innerHTML =
      '<div><span class="sc-name">' + (p.display_name || p.email) + '</span>' +
      (p.company ? ' <span class="sc-company">(' + p.company + ')</span>' : '') +
      '<span class="sc-type-badge" style="background:' + typeBg + '">' + (p.sender_type || 'unknown').replace('_',' ') + '</span></div>' +
      (statsLine ? '<div class="sc-stats">' + statsLine + '</div>' : '') +
      '<div class="' + noteClass + '" id="scNote">' + noteText + '</div>';
    senderCard.classList.add('visible');

    const noteEl = document.getElementById('scNote');
    noteEl.addEventListener('click', function() {
      const current = p.relationship_note || '';
      noteEl.innerHTML = '<textarea class="sc-note-edit" id="scNoteEdit">' + current + '</textarea>';
      const ta = document.getElementById('scNoteEdit');
      ta.focus();
      ta.addEventListener('blur', async function() {
        const newNote = ta.value.trim();
        if (newNote !== current) {
          try {
            await fetch('/senders/' + encodeURIComponent(p.email) + '/note', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({relationship_note: newNote})
            });
            p.relationship_note = newNote;
          } catch(e) { /* silently fail */ }
        }
        noteEl.textContent = newNote || 'Click to add a note...';
        noteEl.className = newNote ? 'sc-note' : 'sc-note sc-new';
      });
    });
  }

  senderInput.addEventListener('input', () => {
    const val = senderInput.value.trim();
    if (!val) {
      senderBadge.style.display = 'none';
      senderCard.classList.remove('visible');
      return;
    }
    const t = classifySender(val);
    senderBadge.textContent = t.replace('_', ' ');
    senderBadge.style.background = badgeColors[t] || '#666';
    senderBadge.style.color = '#fff';
    senderBadge.style.display = 'inline-block';

    if (senderLookupTimer) clearTimeout(senderLookupTimer);
    senderLookupTimer = setTimeout(async () => {
      try {
        const res = await fetch('/senders/lookup?email=' + encodeURIComponent(val));
        if (res.ok) {
          const data = await res.json();
          renderSenderCard(data);
        }
      } catch(e) {
        senderCard.classList.remove('visible');
      }
    }, 500);
  });

  stars.forEach(s => {
    s.addEventListener('click', () => {
      selectedRating = parseInt(s.dataset.val);
      stars.forEach(st => {
        st.classList.toggle('active', parseInt(st.dataset.val) <= selectedRating);
      });
    });
  });

  function showInfo(msg, cls) {
    info.className = 'info visible' + (cls ? ' ' + cls : '');
    info.innerHTML = msg;
  }

  const toneButtons = document.querySelectorAll('.btn-tone');

  async function regenerateWithTone(toneHint) {
    const text = inbound.value.trim();
    if (!text) return;
    toneButtons.forEach(b => b.disabled = true);
    try {
      const payload = {inbound_text: text, tone_hint: toneHint};
      const sv = senderInput.value.trim();
      if (sv) payload.sender = sv;
      const res = await fetch('/feedback/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('Server error: ' + res.status);
      const data = await res.json();
      generatedDraft = data.draft;
      draft.value = data.draft;
      showInfo('Re-generated with tone: ' + toneHint);
    } catch (e) {
      showInfo('Error: ' + e.message);
    } finally {
      toneButtons.forEach(b => b.disabled = false);
    }
  }

  toneButtons.forEach(btn => {
    btn.addEventListener('click', () => regenerateWithTone(btn.dataset.tone));
  });

  btnGen.addEventListener('click', async () => {
    const text = inbound.value.trim();
    if (!text) { showInfo('Please paste an inbound email first.'); return; }

    btnGen.disabled = true;
    btnGen.innerHTML = 'Generating<span class="spinner"></span>';
    draft.value = '';
    draft.readOnly = true;
    btnSub.disabled = true;

    try {
      const genPayload = {inbound_text: text};
      const senderVal = senderInput.value.trim();
      if (senderVal) genPayload.sender = senderVal;
      const res = await fetch('/feedback/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(genPayload)
      });
      if (!res.ok) throw new Error('Server error: ' + res.status);
      const data = await res.json();
      generatedDraft = data.draft;
      draft.value = data.draft;
      draft.readOnly = false;
      btnSub.disabled = false;
      toneButtons.forEach(b => b.disabled = false);

      let extra = '';
      if (data.precedent_used) {
        extra = '<div class="precedent">Precedent: ' +
          data.precedent_used.map(p => p.title || p.source_id).join(', ') +
          ' | Confidence: ' + (data.confidence || 'unknown') + '</div>';
      }
      showInfo('Draft generated. Edit as needed, then submit.' + extra);
    } catch (e) {
      showInfo('Error: ' + e.message);
    } finally {
      btnGen.disabled = false;
      btnGen.textContent = 'Generate Draft';
    }
  });

  btnSub.addEventListener('click', async () => {
    const editedReply = draft.value.trim();
    if (!editedReply) { showInfo('Draft is empty.'); return; }

    btnSub.disabled = true;
    btnSub.innerHTML = 'Saving<span class="spinner"></span>';

    try {
      const body = {
        inbound_text: inbound.value.trim(),
        generated_draft: generatedDraft,
        edited_reply: editedReply,
        feedback_note: note.value.trim() || null,
        rating: selectedRating
      };
      const res = await fetch('/feedback/submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error('Server error: ' + res.status);
      const data = await res.json();
      showInfo('Saved! Total feedback pairs: ' + data.total_pairs +
        '. <a href="#" onclick="location.reload();return false" style="color:#6c63ff">Generate another?</a>', 'success');
      btnSub.disabled = true;
      draft.readOnly = true;
    } catch (e) {
      showInfo('Error: ' + e.message);
      btnSub.disabled = false;
    } finally {
      btnSub.textContent = 'Submit Feedback';
    }
  });

  // ═══ Review Queue tab ═══
  let rqLoaded = false;
  let rqItems = [];
  let rqIndex = 0;
  let rqReviewed = 0;
  let rqTotalUnreviewed = 0;
  let rqReviewedToday = 0;
  let rqSkippedIds = [];
  let rqRating = 4;

  const rqStars = document.querySelectorAll('#rqStars .star');
  rqStars.forEach(s => {
    s.addEventListener('click', () => {
      rqRating = parseInt(s.dataset.val);
      rqStars.forEach(st => {
        st.classList.toggle('active', parseInt(st.dataset.val) <= rqRating);
      });
    });
  });

  function rqUpdateProgress() {
    const total = rqItems.length;
    const pct = total > 0 ? Math.round((rqReviewed / total) * 100) : 0;
    document.getElementById('rqCount').textContent = rqReviewed + '/' + total + ' reviewed';
    document.getElementById('rqPct').textContent = pct + '%';
    document.getElementById('rqProgressFill').style.width = pct + '%';
    document.getElementById('rqRemaining').textContent =
      rqTotalUnreviewed.toLocaleString() + ' pairs remaining';
  }

  function rqShowItem() {
    // Find next non-skipped item
    while (rqIndex < rqItems.length && rqSkippedIds.includes(rqItems[rqIndex].reply_pair_id)) {
      rqIndex++;
    }

    if (rqIndex >= rqItems.length) {
      // Batch exhausted
      document.getElementById('rqMain').style.display = 'none';
      document.getElementById('rqBatchComplete').style.display = 'block';
      document.getElementById('rqBatchMsg').textContent =
        rqReviewedToday + ' pairs reviewed today. ' + rqTotalUnreviewed.toLocaleString() + ' remaining.';
      // Trigger autoresearch in background
      const arDiv = document.getElementById('rqAutoResearch');
      const arStatus = document.getElementById('rqArStatus');
      arDiv.style.display = 'block';
      fetch('/review-queue/trigger-autoresearch', { method: 'POST' })
        .then(r => r.json())
        .then(d => { arStatus.textContent = d.message || '✅ Autoresearch optimization started in background.'; })
        .catch(() => { arStatus.textContent = '⚠️ Could not trigger autoresearch — will run at 2 AM.'; });
      return;
    }

    const item = rqItems[rqIndex];

    // From line
    const author = item.inbound_author || 'Unknown';
    const nameMatch = author.match(/^([^<]+)/);
    const fromName = nameMatch ? nameMatch[1].trim() : author;
    document.getElementById('rqFromName').textContent = fromName;

    // Sender profile badge
    const typeEl = document.getElementById('rqFromType');
    if (item.sender_profile && item.sender_profile.sender_type) {
      const st = item.sender_profile.sender_type;
      typeEl.textContent = st.replace('_', ' ');
      typeEl.style.background = badgeColors[st] || '#666';
      typeEl.style.display = 'inline-block';
    } else {
      typeEl.style.display = 'none';
    }

    // Company
    const companyEl = document.getElementById('rqFromCompany');
    if (item.sender_profile && item.sender_profile.company) {
      companyEl.textContent = item.sender_profile.company;
      companyEl.style.display = 'block';
    } else {
      companyEl.textContent = '';
      companyEl.style.display = 'none';
    }

    // Subject
    const subjectEl = document.getElementById('rqSubject');
    subjectEl.textContent = item.subject ? 'Subject: ' + item.subject : '';

    // Inbound text
    // Decode HTML entities and display as plain text
    const tmp = document.createElement('textarea');
    tmp.innerHTML = item.inbound_text;
    document.getElementById('rqInboundText').textContent = tmp.value;

    // Draft textarea
    const ta = document.getElementById('rqDraftTextarea');
    ta.value = item.generated_draft;
    ta.focus();

    // Reset note and rating
    document.getElementById('rqNote').value = '';
    rqRating = 4;
    rqStars.forEach(st => {
      st.classList.toggle('active', parseInt(st.dataset.val) <= 4);
    });

    rqUpdateProgress();
  }

  async function loadBatch() {
    rqLoaded = true;
    rqItems = [];
    rqIndex = 0;
    rqReviewed = 0;

    document.getElementById('rqLoading').style.display = 'block';
    document.getElementById('rqMain').style.display = 'none';
    document.getElementById('rqBatchComplete').style.display = 'none';

    try {
      let url = '/review-queue/next?batch_size=10';
      if (rqSkippedIds.length > 0) {
        url += '&exclude_ids=' + rqSkippedIds.join(',');
      }
      const res = await fetch(url);
      if (!res.ok) throw new Error('Server error: ' + res.status);
      const data = await res.json();

      rqItems = data.items;
      rqTotalUnreviewed = data.total_unreviewed;
      rqReviewedToday = data.reviewed_today;

      document.getElementById('rqLoading').style.display = 'none';

      if (rqItems.length === 0) {
        document.getElementById('rqBatchComplete').style.display = 'block';
        document.getElementById('rqBatchMsg').textContent =
          'No unreviewed pairs available. ' + rqReviewedToday + ' reviewed today.';
        return;
      }

      document.getElementById('rqMain').style.display = 'block';
      rqShowItem();
    } catch (e) {
      document.getElementById('rqLoading').style.display = 'none';
      document.getElementById('rqBatchComplete').style.display = 'block';
      document.getElementById('rqBatchMsg').textContent = 'Error loading batch: ' + e.message;
    }
  }

  // Skip button
  document.getElementById('rqSkip').addEventListener('click', () => {
    if (rqIndex < rqItems.length) {
      rqSkippedIds.push(rqItems[rqIndex].reply_pair_id);
      rqIndex++;
      rqShowItem();
    }
  });

  // Submit & Next
  document.getElementById('rqSubmitNext').addEventListener('click', async () => {
    const item = rqItems[rqIndex];
    if (!item) return;

    const btn = document.getElementById('rqSubmitNext');
    btn.disabled = true;
    btn.innerHTML = 'Saving<span class="spinner"></span>';

    try {
      const body = {
        reply_pair_id: item.reply_pair_id,
        inbound_text: item.inbound_text,
        generated_draft: item.generated_draft,
        edited_reply: document.getElementById('rqDraftTextarea').value.trim() || item.generated_draft,
        feedback_note: document.getElementById('rqNote').value.trim() || null,
        rating: rqRating
      };
      const res = await fetch('/review-queue/submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error('Server error: ' + res.status);

      rqReviewed++;
      rqReviewedToday++;
      rqTotalUnreviewed = Math.max(0, rqTotalUnreviewed - 1);
      rqIndex++;
      rqShowItem();
    } catch (e) {
      alert('Error submitting: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Submit & Next';
    }
  });

  // Compare button — show retrieval vs baseline side by side
  document.getElementById('rqCompare').addEventListener('click', async () => {
    const item = rqItems[rqIndex];
    if (!item) return;
    const btn = document.getElementById('rqCompare');
    btn.disabled = true;
    btn.innerHTML = 'Comparing<span class="spinner"></span>';
    try {
      const res = await fetch('/draft/compare', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({inbound_text: item.inbound_text, sender: item.inbound_author})
      });
      if (!res.ok) throw new Error('Server error: ' + res.status);
      const data = await res.json();
      const ta = document.getElementById('rqDraftTextarea');
      ta.value = '=== RETRIEVAL DRAFT (confidence: ' + data.retrieval_confidence +
        ', ' + data.exemplar_count + ' exemplars) ===\n' + data.retrieval_draft +
        '\n\n=== BASELINE DRAFT (no exemplars) ===\n' + data.baseline_draft;
    } catch (e) { alert('Compare error: ' + e.message); }
    finally { btn.disabled = false; btn.textContent = 'Compare'; }
  });

  // Load next batch button
  document.getElementById('rqLoadNext').addEventListener('click', () => {
    loadBatch();
  });

  // ═══ URL param pre-fill (bookmarklet support) ═══
  (function() {
    const params = new URLSearchParams(window.location.search);
    const pInbound = params.get('inbound');
    const pSender = params.get('sender');
    const pSubject = params.get('subject');
    if (pInbound || pSender || pSubject) {
      // Switch to Draft Reply tab
      tabs.forEach(t => t.classList.remove('active'));
      tabContents.forEach(tc => tc.classList.remove('active'));
      document.querySelector('[data-tab="draft-reply"]').classList.add('active');
      document.getElementById('tab-draft-reply').classList.add('active');

      if (pInbound) inbound.value = pInbound;
      if (pSender) {
        senderInput.value = pSender;
        senderInput.dispatchEvent(new Event('input'));
      }
      // Focus inbound for quick review
      inbound.focus();
    }
  })();
})();
</script>
</body>
</html>
