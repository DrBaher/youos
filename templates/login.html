<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YouOS — Login</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e; color: #e0e0e0; min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
}
.login-box {
  width: 100%; max-width: 360px; padding: 2.5rem 2rem;
  background: #16213e; border: 1px solid #333; border-radius: 12px;
  text-align: center;
}
h1 { font-size: 1.3rem; color: #c8c8ff; margin-bottom: 0.5rem; }
p { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
input[type="password"] {
  width: 100%; padding: 0.7rem 1rem; margin-bottom: 1rem;
  background: #1a1a2e; border: 1px solid #333; border-radius: 6px;
  color: #e0e0e0; font-size: 1rem; text-align: center;
  letter-spacing: 0.2em;
}
input[type="password"]:focus { outline: none; border-color: #6c63ff; }
button {
  width: 100%; padding: 0.7rem; border: none; border-radius: 6px;
  background: #6c63ff; color: #fff; font-size: 0.95rem;
  font-weight: 600; cursor: pointer;
}
button:hover { background: #5a52d5; }
.error {
  color: #e74c3c; font-size: 0.85rem; margin-bottom: 1rem;
  display: none;
}
.error.visible { display: block; }
</style>
</head>
<body>
<form class="login-box" method="POST" action="/login">
  <h1>YouOS</h1>
  <p>Enter your access PIN to continue.</p>
  <div class="error" id="error">{{ error }}</div>
  <input type="password" name="pin" placeholder="PIN" autofocus autocomplete="off">
  <button type="submit">Unlock</button>
</form>
<script>
  const err = document.getElementById('error');
  if (err.textContent.trim()) err.classList.add('visible');
</script>
</body>
</html>
