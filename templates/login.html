<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YouOS — Login</title>
<script>(function(){try{var p=new URLSearchParams(location.search).get('theme');var t=(p==='light'||p==='dark')?p:localStorage.getItem('youos-theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="icon" type="image/svg+xml" href="/static/youos-mark.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="stylesheet" href="/static/youos.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
}
.login-box {
  width: 100%; max-width: 360px; padding: 2.5rem 2rem;
  background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;
  text-align: center;
}
h1 { font-size: 1.3rem; color: #c8c8ff; margin-bottom: 0.5rem; }
p { font-size: 0.85rem; color: var(--muted-2); margin-bottom: 1.5rem; }
input[type="password"] {
  width: 100%; padding: 0.7rem 1rem; margin-bottom: 1rem;
  background: var(--bg); border: 1px solid var(--border-subtle); border-radius: 6px;
  color: var(--text); font-size: 1rem; text-align: center;
  letter-spacing: 0.2em;
}
input[type="password"]:focus { outline: none; border-color: #6c63ff; }
button {
  width: 100%; padding: 0.7rem; border: none; border-radius: 6px;
  background: #6c63ff; color: #fff; font-size: 0.95rem;
  font-weight: 600; cursor: pointer;
}
button:hover { background: #5a52d5; }
.error {
  color: var(--error); font-size: 0.85rem; margin-bottom: 1rem;
  display: none;
}
.error.visible { display: block; }
</style>
</head>
<body>
<form class="login-box" method="POST" action="/login">
  <h1>YouOS</h1>
  <p>Enter your access PIN to continue.</p>
  <div class="error" id="error">{{ error }}</div>
  <input type="password" name="pin" placeholder="PIN" autofocus autocomplete="off">
  <button type="submit">Unlock</button>
</form>
<script>
  const err = document.getElementById('error');
  if (err.textContent.trim()) err.classList.add('visible');
</script>
<script src="/static/youos.js" defer></script>
</body>
</html>
