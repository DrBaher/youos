<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YouOS Draft</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.6rem 1rem; background: #0d1b2a;
  border-bottom: 1px solid #2a3a4a; flex-shrink: 0;
}
.logo { color: #00c4a7; font-weight: 700; font-size: 0.95rem; }
.close-btn {
  background: none; border: none; color: #666; font-size: 1.1rem;
  cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 3px;
}
.close-btn:hover { color: #ccc; background: #333; }
.body { flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.6rem; }
.label { font-size: 0.75rem; color: #888; font-weight: 600; margin-bottom: 0.2rem; }
.inbound-box {
  background: #0d1b2a; border: 1px solid #2a3a4a; border-radius: 6px;
  padding: 0.5rem 0.7rem; font-size: 0.82rem; color: #aaa;
  max-height: 90px; overflow-y: auto; line-height: 1.4; white-space: pre-wrap; word-break: break-word;
}
textarea {
  width: 100%; background: #16213e; border: 1px solid #333; border-radius: 6px;
  color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 0.88rem; resize: none; padding: 0.6rem 0.75rem; line-height: 1.5;
  flex: 1; min-height: 120px;
}
textarea:focus { outline: none; border-color: #00c4a7; }
.subject-line {
  font-size: 0.78rem; color: #00c4a7; cursor: pointer; margin-top: 0.2rem;
}
.subject-line:hover { text-decoration: underline; }
.confidence-badge {
  display: inline-block; font-size: 0.68rem; padding: 0.15rem 0.5rem;
  border-radius: 3px; margin-left: 0.4rem; vertical-align: middle;
}
.conf-high { background: #1a4a2a; color: #2ecc71; }
.conf-medium { background: #3a3a1a; color: #f0ad4e; }
.conf-low { background: #4a1a1a; color: #e74c3c; }
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.footer {
  padding: 0.6rem 0.75rem; border-top: 1px solid #2a3a4a;
  display: flex; gap: 0.5rem; flex-shrink: 0; background: #1a1a2e;
}
button {
  padding: 0.45rem 0.9rem; border: none; border-radius: 5px;
  font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
}
button:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-generate { background: #00c4a7; color: #1a1a2e; flex: 1; }
.btn-generate:hover:not(:disabled) { background: #00b398; }
.btn-insert { background: #2ecc71; color: #fff; flex: 1; }
.btn-insert:hover:not(:disabled) { background: #27ae60; }
.btn-tone { background: #2a3a4a; color: #aaa; font-size: 0.74rem; padding: 0.35rem 0.65rem; }
.btn-tone:hover:not(:disabled) { background: #3a4a5a; color: #e0e0e0; }
.tone-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.warn { font-size: 0.75rem; color: #f0ad4e; padding: 0.3rem 0.5rem; background: #2a2a0a; border-radius: 4px; border-left: 3px solid #f0ad4e; }
.feedback-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; border-top: 1px solid #2a3a4a; background: #0d1b2a; flex-shrink: 0; }
.stars { display: flex; gap: 0.2rem; }
.star { font-size: 1.2rem; cursor: pointer; color: #444; transition: color 0.1s; line-height: 1; }
.star.on { color: #ffc107; }
.feedback-note {
  flex: 1; background: #16213e; border: 1px solid #333; border-radius: 4px;
  color: #e0e0e0; font-size: 0.78rem; padding: 0.3rem 0.5rem;
}
.feedback-note:focus { outline: none; border-color: #00c4a7; }
.btn-feedback { background: #2ecc71; color: #fff; font-size: 0.75rem; padding: 0.35rem 0.7rem; white-space: nowrap; }
.btn-feedback:hover:not(:disabled) { background: #27ae60; }
.feedback-sent { font-size: 0.75rem; color: #2ecc71; display: none; }
.feedback-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.stars { display: flex; gap: 0.2rem; }
.star { font-size: 1.1rem; cursor: pointer; color: #444; transition: color 0.1s; }
.star.on { color: #ffc107; }
.note-input {
  flex: 1; min-width: 0; background: #16213e; border: 1px solid #333; border-radius: 4px;
  color: #e0e0e0; font-size: 0.78rem; padding: 0.3rem 0.5rem;
}
.note-input:focus { outline: none; border-color: #00c4a7; }
.btn-submit-fb { background: #2a3a4a; color: #aaa; font-size: 0.78rem; padding: 0.35rem 0.7rem; white-space: nowrap; }
.btn-submit-fb:hover:not(:disabled) { background: #2ecc71; color: #fff; }
.fb-sent { font-size: 0.75rem; color: #2ecc71; text-align: center; display: none; padding: 0.2rem; }
</style>
</head>
<body>
<div class="header">
  <span class="logo" id="appName">&#x2709;&#xFE0F; YouOS</span>
  <button class="close-btn" onclick="window.parent.postMessage({type:'youos-close'},'*')">&#x2715;</button>
</div>

<div class="body">
  <div>
    <div class="label">Inbound email</div>
    <div class="inbound-box" id="inboundPreview"></div>
  </div>

  <div style="flex:1;display:flex;flex-direction:column;gap:0.4rem;margin-bottom:0.6rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span class="label">Your instruction (optional)</span>
    </div>
    <textarea id="userPromptArea" placeholder="e.g. decline politely, suggest next Tuesday 14:00" rows="3"></textarea>
  </div>

  <div style="flex:1;display:flex;flex-direction:column;gap:0.4rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span class="label">Draft reply <span id="confBadge" class="confidence-badge" style="display:none"></span></span>
      <div class="tone-row" id="toneRow" style="display:none;">
        <button class="btn-tone" data-tone="shorter">Shorter</button>
        <button class="btn-tone" data-tone="more_formal">Formal</button>
        <button class="btn-tone" data-tone="more_detail">Detail</button>
      </div>
    </div>
    <textarea id="draftArea" placeholder="Click Generate Draft..." rows="8"></textarea>
    <div id="subjectLine" class="subject-line" style="display:none;"></div>
    <div id="warnBox" class="warn" style="display:none;"></div>
  </div>
</div>

<div id="feedbackRow" style="padding:0.5rem 0.75rem;border-top:1px solid #2a3a4a;display:none;background:#1a1a2e;">
  <div class="feedback-row">
    <div class="stars" id="stars">
      <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span>
      <span class="star" data-v="3">★</span><span class="star" data-v="4">★</span><span class="star" data-v="5">★</span>
    </div>
    <input class="note-input" id="fbNote" type="text" placeholder="Optional note...">
    <button class="btn-submit-fb" id="btnFeedback">Submit</button>
  </div>
  <div class="fb-sent" id="fbSent">✓ Feedback saved</div>
</div>
<div class="footer">
  <button class="btn-generate" id="btnGenerate">Generate Draft</button>
  <button class="btn-insert" id="btnInsert" disabled>Insert into Gmail</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const inbound = params.get('inbound') || '';
let sender = params.get('sender') || '';
const subject = params.get('subject') || '';
const userPrompt = params.get('user_prompt') || '';

// E8: if sender wasn't in URL params, request it from parent (bookmarklet in Gmail)
if (!sender) {
  window.parent.postMessage({type: 'youos-request-sender'}, '*');
}
// E8: listen for sender context pushed from parent
window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'youos-sender-context' && e.data.email && !sender) {
    sender = e.data.email;
  }
});

// Show inbound preview
document.getElementById('inboundPreview').textContent = inbound.slice(0, 400);

// Pre-fill user prompt area
const userPromptArea = document.getElementById('userPromptArea');
if (userPrompt) {
  userPromptArea.value = userPrompt;
}

// Fetch app name
fetch('/api/config').then(r => r.json()).then(d => {
  if (d.display_name) document.getElementById('appName').textContent = '\u2709\uFE0F ' + d.display_name;
}).catch(() => {});

let generatedDraft = '';

async function generateDraft(toneHint) {
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.innerHTML = 'Generating<span class="spinner" style="margin-left:0.3rem"></span>';
  document.getElementById('draftArea').value = '';
  document.getElementById('btnInsert').disabled = true;
  document.getElementById('toneRow').style.display = 'none';
  document.getElementById('warnBox').style.display = 'none';
  document.getElementById('subjectLine').style.display = 'none';
  document.getElementById('confBadge').style.display = 'none';

  try {
    // Try streaming first
    const payload = { inbound_text: inbound };
    if (sender) payload.sender = sender;
    if (toneHint) payload.tone_hint = toneHint;
    const currentPrompt = userPromptArea.value.trim();
    if (currentPrompt) payload.user_prompt = currentPrompt;
    const streamRes = await fetch('/draft/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (streamRes.ok && streamRes.headers.get('content-type')?.includes('text/event-stream')) {
      const reader = streamRes.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let streamConfidence = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const p = JSON.parse(line.slice(6));
            if (p.done) { streamConfidence = p.confidence || ''; }
            else if (p.token) { document.getElementById('draftArea').value += p.token + '\n'; }
          } catch (e) {}
        }
      }

      generatedDraft = document.getElementById('draftArea').value.trim();
      document.getElementById('draftArea').value = generatedDraft;
      showConfidence(streamConfidence);
    } else {
      // Fallback non-streaming
      const res = await fetch('/feedback/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      generatedDraft = data.draft;
      document.getElementById('draftArea').value = generatedDraft;
      showConfidence(data.confidence);
      if (data.suggested_subject) showSubject(data.suggested_subject);
    }

    document.getElementById('btnInsert').disabled = false;
    document.getElementById('toneRow').style.display = 'flex';
  } catch (e) {
    document.getElementById('draftArea').value = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Regenerate';
  }
}

function showConfidence(conf) {
  const badge = document.getElementById('confBadge');
  if (!conf) return;
  badge.textContent = conf;
  badge.className = 'confidence-badge conf-' + conf;
  badge.style.display = 'inline-block';
  if (conf === 'low') {
    const w = document.getElementById('warnBox');
    w.textContent = '⚠️ Low confidence — no strong precedents found. Draft may not reflect your style.';
    w.style.display = 'block';
  }
}

function showSubject(s) {
  const el = document.getElementById('subjectLine');
  el.textContent = 'Subject: ' + s;
  el.style.display = 'block';
  el.onclick = () => { navigator.clipboard.writeText(s).catch(() => {}); el.textContent = 'Copied!'; setTimeout(() => { el.textContent = 'Subject: ' + s; }, 1000); };
}

document.getElementById('btnGenerate').addEventListener('click', () => generateDraft(null));

document.querySelectorAll('.btn-tone').forEach(btn => {
  btn.addEventListener('click', () => generateDraft(btn.dataset.tone));
});

document.getElementById('btnInsert').addEventListener('click', () => {
  const draft = document.getElementById('draftArea').value.trim();
  if (!draft) return;
  window.parent.postMessage({ type: 'youos-insert', draft }, '*');
});

// Star rating
let selectedRating = 4;
document.querySelectorAll('.star').forEach(s => {
  s.addEventListener('mouseover', () => {
    document.querySelectorAll('.star').forEach(st => st.classList.toggle('on', parseInt(st.dataset.v) <= parseInt(s.dataset.v)));
  });
  s.addEventListener('mouseout', () => {
    document.querySelectorAll('.star').forEach(st => st.classList.toggle('on', parseInt(st.dataset.v) <= selectedRating));
  });
  s.addEventListener('click', () => {
    selectedRating = parseInt(s.dataset.v);
    document.querySelectorAll('.star').forEach(st => st.classList.toggle('on', parseInt(st.dataset.v) <= selectedRating));
  });
});
// Default 4 stars
document.querySelectorAll('.star').forEach(st => st.classList.toggle('on', parseInt(st.dataset.v) <= 4));

document.getElementById('btnFeedback').addEventListener('click', async () => {
  const edited = document.getElementById('draftArea').value.trim();
  if (!edited) return;
  const btn = document.getElementById('btnFeedback');
  btn.disabled = true;
  btn.textContent = '...';
  try {
    await fetch('/feedback/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        inbound_text: inbound,
        generated_draft: generatedDraft,
        edited_reply: edited,
        feedback_note: document.getElementById('fbNote').value.trim() || null,
        rating: selectedRating,
      }),
    });
    document.getElementById('fbSent').style.display = 'block';
    btn.textContent = '✓';
  } catch (e) {
    btn.textContent = 'Error';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
