top_k_reply_pairs: 8
top_k_documents: 3
top_k_chunks: 3
recency_boost_days: 60
recency_boost_weight: 0.2
account_boost_weight: 0.15
semantic_weight: 0.4
semantic_min_coverage: 0.01
sender_type_boost: 0.15
sender_domain_boost: 0.1
reranker_enabled: false
subject_match_boost: 0.2
topic_match_boost: 0.15
field_match_bonus_per_token: 0.25
lexical_scale: 2.0
lexical_cap: 10.0
# Min-max normalize the lexical (BM25) score to [0,1] before truncation so the
# metadata boosts (recency/account/sender) and semantic_weight can actually
# reorder results. Off by default (raw BM25 dominates otherwise). Turn on per
# instance + A/B draft quality before relying on it.
normalize_scores: false
sender_type_boost_map:
  external_client: 1.3
  personal: 0.8
  automated: 0.3
  internal: 1.5
