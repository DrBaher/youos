autoresearch:
  enabled: true
  iterations: 80
  schedule: 0 1 * * *
benchmarks:
  last_refresh_count: 0
ingestion:
  accounts: []
  initial_months: 12
  mode: quick_start # default onboarding path: quick first value, background full ingest
  quick_start_enabled: true
  quick_start_months: 3
  quick_start_max_threads: 200
  last_ingest_at: {}
model:
  adapter_path: models/adapters/latest
  base: mlx-community/Qwen3-4B-Instruct-2507-4bit
  # Dedicated multilingual (DE/EN) retrieval embedder, decoupled from `base`
  # (b177/b180). Loaded via mlx_embeddings on Apple Silicon; 384-d, MIT license.
  # Changing this id marks existing rows stale (b177 tagging) → run
  # `python scripts/index_embeddings.py --reindex` to re-embed the corpus.
  embedding_model: intfloat/multilingual-e5-small
  fallback: claude
  ollama:
    enabled: false
    model: mistral
    base_url: http://localhost:11434
generation:
  # Best-of-N drafting (b186/b194). When n > 1, callers that opt in
  # (multi_candidate_ok=True) generate n drafts on a temperature spread and keep
  # the highest draft_quality_score one. Measured lift on an 80-case voice-match
  # benchmark (4B+LoRA): n=5 gives voice +0.013, lenfit +0.078, style +0.018 vs
  # n=1, scaling ~linearly with n. The cost is n× generation, so it is gated to
  # paths where latency is HIDDEN — the autonomous triage sweep (drafts wait in
  # the review queue) and the compare-models harness. Interactive drafting
  # (/draft, /feedback, CLI, review-queue regenerate) ignores this and stays
  # single-candidate / fast. Deterministic eval (golden/autoresearch) is also
  # exempt (always one greedy candidate). Set n: 1 to disable everywhere.
  multi_candidate:
    n: 5
persona:
  avg_reply_words: 40
  closing_formal: 'Best,

    {name}'
  closing_informal: 'Cheers,

    {name}'
  custom_constraints: []
  greeting_style: Hi [name],
  modes:
    internal:
      style_anchor: Prefer concise, execution-focused replies with minimal ceremony and direct next steps.
    client:
      style_anchor: Prefer polished, reassuring, professional replies that clarify ownership, timeline, and concrete deliverables.
    personal:
      style_anchor: Prefer warm, natural, low-formality replies that still stay crisp and thoughtful.
server:
  host: 127.0.0.1
  pin: ''
  port: 8901
tailscale:
  hostname: ''
user:
  display_name: ''
  emails: []
  name: ''
  names: []
  timezone: Europe/Vienna
